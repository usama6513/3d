<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Hand Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 20px; left: 20px;
            color: white;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
        /* Hide the webcam video, we only need the data */
        #webcam { display: none; }
    </style>
</head>
<body>

    <div id="info">
        <h1>Hand Gesture Particles</h1>
        <p>Pinch fingers to expand | Move hand to attract</p>
        <div id="status">Loading AI Models...</div>
    </div>

    <video id="webcam" autoplay playsinline></video>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <script>
        // --- 1. THREE.JS SETUP ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const particleCount = 10000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);
        const velocities = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);

        for (let i = 0; i < particleCount; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 10;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 10;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 10;
            
            colors[i * 3] = Math.random();
            colors[i * 3 + 1] = Math.random();
            colors[i * 3 + 2] = 1.0;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.04,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            opacity: 0.8
        });

        const points = new THREE.Points(geometry, material);
        scene.add(points);
        camera.position.z = 5;

        // --- 2. MEDIAPIPE HAND TRACKING ---
        const video = document.getElementById('webcam');
        const status = document.getElementById('status');
        let handX = 0, handY = 0, pinchDist = 0;

        function onResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                status.innerText = "Hand Detected";
                const landmarks = results.multiHandLandmarks[0];
                
                // Track Index Finger Tip (Landmark 8)
                handX = (landmarks[8].x - 0.5) * -12; // Invert X for mirroring
                handY = (landmarks[8].y - 0.5) * -10;

                // Calculate pinch (Distance between thumb tip 4 and index tip 8)
                const dx = landmarks[4].x - landmarks[8].x;
                const dy = landmarks[4].y - landmarks[8].y;
                pinchDist = Math.sqrt(dx*dx + dy*dy);
            } else {
                status.innerText = "Looking for hand...";
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });
        hands.onResults(onResults);

        const cam = new Camera(video, {
            onFrame: async () => { await hands.send({ image: video }); },
            width: 640, height: 480
        });
        cam.start();

        // --- 3. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);

            const posArr = points.geometry.attributes.position.array;
            const colArr = points.geometry.attributes.color.array;

            for (let i = 0; i < particleCount; i++) {
                const i3 = i * 3;

                // Physics: Move particles toward hand
                posArr[i3] += (handX - posArr[i3]) * 0.02 * (Math.random() + 0.1);
                posArr[i3 + 1] += (handY - posArr[i3 + 1]) * 0.02 * (Math.random() + 0.1);

                // Interaction: Expansion based on pinch
                if (pinchDist > 0.1) {
                    posArr[i3] += (Math.random() - 0.5) * pinchDist * 2;
                    posArr[i3 + 1] += (Math.random() - 0.5) * pinchDist * 2;
                    
                    // Dynamic Color Change
                    colArr[i3] = Math.sin(Date.now() * 0.001); // Red cycles
                }
            }

            points.geometry.attributes.position.needsUpdate = true;
            points.geometry.attributes.color.needsUpdate = true;
            
            points.rotation.y += 0.002;
            renderer.render(scene, camera);
        }

        animate();

        // Handle Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
